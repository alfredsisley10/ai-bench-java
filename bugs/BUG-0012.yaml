  file: accounts-consumer/src/test/java/com/omnibank/accounts/consumer/internal/HoldEntityTest.java

problemStatement: |
  HoldEntity.isActive treats a hold as active when now.isBefore(expiresAt).
  Intended behavior is that the hold is active up to and including its expiry
  instant (inclusive on expiresAt). Use !now.isAfter(expiresAt) instead.
