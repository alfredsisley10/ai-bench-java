problemStatement: |
  WireCutoffPolicy.isFedwireOpen checks weekday but not holiday status. On
  a Fed-observed holiday (e.g. Juneteenth) the current implementation would
  accept a wire for same-day settlement even though Fedwire is closed. Use
  BusinessCalendar.isBusinessDay to guard the check.

