problemStatement: |
  The Fedwire open/closed check verifies only that the day is a weekday and
  does not consult the Federal Reserve holiday calendar. On a Fed-observed
  holiday (e.g. Juneteenth) same-day wire submissions are incorrectly accepted
  even though Fedwire is closed. The check must also verify that the day is a
  recognised business day before treating the settlement window as open.

