problemStatement: |
  Money.dividedBy currently throws ArithmeticException when the result cannot
  be represented exactly (e.g. 100 / 3). Banker's rounding should be used at
  a scale of currency.minorUnits + 4 to avoid truncation and still survive
  non-terminating quotients. Fix Money.dividedBy to specify the scale and
  rounding mode explicitly.

