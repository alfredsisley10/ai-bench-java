problemStatement: |
  Dividing a monetary amount by a number that produces a non-terminating decimal
  (e.g. 100 ÷ 3) throws ArithmeticException instead of returning a rounded
  result. Banker's rounding should be applied at a scale of
  currency.minorUnits + 4 so that non-terminating quotients are handled without
  error. The division operation must specify both the scale and rounding mode
  explicitly.

