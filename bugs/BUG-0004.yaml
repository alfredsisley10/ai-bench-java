problemStatement: |
  The US 30/360 convention rolls day-of-month 31 to 30 for the end-date under
  specific conditions. An accidental branch in THIRTY_360.yearFraction also
  snaps Feb 28 (or 29 in leap years) to 30, inflating accrual on short-month
  coupon periods. Restore the textbook 30/360 rule: only d2==31 with d1==30
  triggers the d2 rewrite.

