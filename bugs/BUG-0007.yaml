problemStatement: |
  AmortizationCalculator.standardAmortizing is supposed to absorb rounding
  drift on the final installment so closing balance is zero. A regression
  dropped the `if (i == periods)` special case; the final installment is now
  computed like any other, leaving a residual of a few cents. Restore the
  final-installment branch that sets principalPortion = balance and closing =
  zero.

