problemStatement: |
  The last scheduled payment of a standard amortization schedule does not
  close the loan to zero. A regression removed the special-case logic that
  absorbed accumulated cents-of-precision error on the closing period; the
  value is now derived from the regular periodic formula, leaving a residual
  of a few cents after the schedule completes. The closing payment's
  principal portion must be set to whatever remains outstanding so the loan
  settles cleanly.

