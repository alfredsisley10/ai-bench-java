problemStatement: |
  The final installment of a standard amortization schedule fails to close the
  loan at exactly zero. A regression removed the special case that absorbs
  rounding drift on the last period; the installment is now computed using the
  normal formula, leaving a residual of a few cents. The final installment must
  set its principal portion to the remaining balance so that the closing balance
  is forced to zero.

