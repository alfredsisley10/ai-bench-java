  file: ledger-core/src/test/java/com/omnibank/ledger/internal/PostingServiceImplIT.java

problemStatement: |
  A mixed-currency journal entry with exactly two posting lines can pass the
  single-currency validation check when one line's GL account currency differs
  from that line's amount currency. The trial balance invariant is then broken
  for the rest of the day. Cross-currency journals must be rejected before any
  database write.

