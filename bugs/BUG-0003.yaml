hiddenTest:
  class: com.omnibank.ledger.internal.PostingServiceImplIT
  method: mixed_currency_journal_rejected_before_persistence
  file: ledger-core/src/test/java/com/omnibank/ledger/internal/PostingServiceImplIT.java

problemStatement: |
  An edge case in the validate() routine in PostingServiceImpl allows a
  mixed-currency journal entry to pass the single-currency check if the entry
  has exactly two lines and one of them references a GL account in a different
  currency than the line amount. Trial balance invariant is then broken for
  the rest of the day. Tighten validation so cross-currency journals are
  rejected BEFORE any DB write.

