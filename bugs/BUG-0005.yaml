problemStatement: |
  BalanceView.available = ledger - activeHolds. A hold scheduled to expire
  later the same calendar day is currently excluded from activeHoldsTotal
  because the comparison uses isBefore on LocalDate rather than Instant.
  This lets customers spend money that is still properly reserved. Fix the
  comparison to use Instant.now from the injected Clock.

