problemStatement: |
  Applying a percentage to a monetary amount produces a result with 10 decimal
  places instead of the currency's minor-unit scale. An extra `.setScale(10)`
  call left over from debugging is applied before the final rounding step,
  overriding the currency-scale guarantee. The stray scale call must be
  removed.
