problemStatement: |
  The loan state machine allows a direct transition from APPROVED to ACTIVE,
  but this path is illegal — a loan must pass through FUNDED so the
  disbursement posting is recorded before activation. The APPROVED → ACTIVE
  transition must be rejected as an invalid state change.

