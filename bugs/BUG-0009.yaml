  file: ledger-core/src/test/java/com/omnibank/ledger/internal/JournalHistoryQueryTest.java

problemStatement: |
  LedgerQueriesImpl.journalHistory lazily loads lines for each returned
  journal, producing N+1 SQL queries for a busy account. Switch the repository
  query to a JOIN FETCH on lines (or mark the relationship with a
  @BatchSize)so the number of queries is O(1) in the number of journals.
  AppMap traces will show the SQL count explicitly.

appmap:
  recommendedTests:
    - com.omnibank.ledger.internal.LedgerQueriesImplIT
  traceFocus:
    - LedgerQueriesImpl.journalHistory
    - JournalEntryRepository.findJournalsForAccount
