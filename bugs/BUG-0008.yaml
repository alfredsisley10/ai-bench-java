problemStatement: |
  Two simultaneous requests carrying the same idempotency key race past the
  initial findByIdempotencyKey check and both succeed in inserting new
  records, violating the unique index on the duplicate row. The second
  caller should respond with the identifier produced by the first. Add a
  narrow catch for DataIntegrityViolationException that re-reads the
  existing record and surfaces its identifier.

