<!--
  Activity-bar icon for the ai-bench Copilot Bridge extension.

  Same bridge motif as icon.png (two nodes, arch, spark), drawn
  monochrome so VSCode can tint it per theme. Activity-bar icons must
  be SVG with a 24x24 viewBox, use `currentColor` for fill/stroke, and
  avoid embedded styles — VSCode strips most CSS during recoloring.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
     fill="none" stroke="currentColor" stroke-width="1.6"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- Bridge arch from left node to right node -->
    <path d="M5 9 Q12 2.5 19 9" />
    <!-- Spark / signal at apex -->
    <circle cx="12" cy="3.4" r="1.3" fill="currentColor" stroke="none"/>
    <!-- Left node + pillar -->
    <circle cx="5" cy="9" r="1.7" fill="currentColor" stroke="none"/>
    <line x1="5" y1="10.7" x2="5" y2="20"/>
    <!-- Right node + pillar -->
    <circle cx="19" cy="9" r="1.7" fill="currentColor" stroke="none"/>
    <line x1="19" y1="10.7" x2="19" y2="20"/>
    <!-- Floor ticks -->
    <line x1="2.5" y1="20.5" x2="7.5" y2="20.5"/>
    <line x1="16.5" y1="20.5" x2="21.5" y2="20.5"/>
</svg>
