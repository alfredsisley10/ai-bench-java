<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page('Dashboard', ~{::main})}">
<body>
<main>
    <section>
        <h2>Summary</h2>
        <div class="cards">
            <div class="card"><span class="label">Runs</span><span class="value" th:text="${totalRuns}">0</span></div>
            <div class="card"><span class="label">Pass rate</span><span class="value" th:text="${#numbers.formatPercent(passRate, 1, 1)}">0%</span></div>
            <div class="card"><span class="label">Solvers</span><span class="value" th:text="${#lists.isEmpty(solvers) ? 'none registered' : #strings.listJoin(solvers, ', ')}">none</span></div>
            <div class="card"><span class="label">Bugs</span><span class="value" th:text="${availableBugs}">0</span></div>
        </div>
    </section>

    <!-- Merged results section. Was previously a separate /results page;
         consolidated here so the operator sees summary + full run history
         in one scroll instead of bouncing between pages. The
         /results/{runId} detail route is unchanged; bare /results now
         redirects here. -->
    <section>
        <h2>Benchmark runs</h2>
        <p class="subtitle">All completed benchmark runs. Click a Run ID for the full transcript.</p>

        <div th:if="${#lists.isEmpty(runs)}">
            <p class="empty-state">
                No benchmark runs yet.
                <a th:if="${isAdmin}" href="/run">Launch one</a>
                — or <a href="/demo">try a demo issue</a>.
            </p>
        </div>
        <table th:unless="${#lists.isEmpty(runs)}">
            <thead>
            <tr>
                <th>Run ID</th><th>Bug / Ticket</th><th>Solver</th><th>Model</th>
                <th>AppMap</th><th>Status</th><th>Pass / total</th>
                <th>Prompt tokens</th><th>Completion tokens</th><th>Duration</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${runs}">
                <td><a th:href="'/results/' + ${r.id}" th:text="${r.id}"></a></td>
                <td th:text="${r.issueId}"></td>
                <td th:text="${r.provider}"></td>
                <td th:text="${r.modelId}"></td>
                <td th:text="${r.appmapMode}"></td>
                <td><span th:class="'badge ' + ${r.status.name()}" th:text="${r.status.name()}"></span></td>
                <td th:text="${r.seedResults.?[passed].size()} + ' / ' + ${r.seeds}"></td>
                <td th:text="${r.stats.totalPromptTokens}"></td>
                <td th:text="${r.stats.totalCompletionTokens}"></td>
                <td th:text="${(r.durationMs / 1000) + 's'}"></td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
