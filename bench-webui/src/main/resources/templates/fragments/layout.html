<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:fragment="page(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'ai-bench — ' + ${title}">ai-bench</title>
    <script src="https://unpkg.com/htmx.org@2.0.2"></script>
    <script defer src="/static/sortable-table.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
    <div class="header-row">
        <h1>ai-bench-java</h1>
        <span class="user-badge" th:if="${isAdmin}">manager</span>
        <span class="user-badge viewer" th:unless="${isAdmin}">viewer</span>
    </div>
    <nav>
        <a href="/">Dashboard</a>
        <a href="/demo">Demo</a>
        <a href="/copilot-guide">Copilot guide</a>
        <a href="/docs/operations-guide">Ops guide</a>
        <span th:if="${isAdmin}" class="nav-sep">|</span>
        <span th:if="${isAdmin}" class="nav-group-label">Admin</span>
        <a th:if="${isAdmin}" href="/run">Run benchmark</a>
        <a th:if="${isAdmin}" href="/github">GitHub</a>
        <a th:if="${isAdmin}" href="/jira">JIRA</a>
        <a th:if="${isAdmin}" href="/llm">LLMs</a>
        <a th:if="${isAdmin}" href="/appmap-navie">AppMap Navie</a>
        <a th:if="${isAdmin}" href="/proxy">Proxy</a>
        <a th:if="${isAdmin}" href="/api-docs">API docs</a>
    </nav>
</header>
<main th:insert="${content}">
</main>
<footer style="margin-top:2em; padding:0.5em 0.75em; border-top:1px solid #e5e7eb;
               color:#6b7280; font-size:0.8em; display:flex; gap:0.6em; flex-wrap:wrap; align-items:center">
    <span>
        bench-webui <strong th:text="${buildInfo.version}">dev</strong>
    </span>
    <span>·</span>
    <span th:title="'Full SHA: ' + ${buildInfo.gitCommitFull} + ' · branch: ' + ${buildInfo.gitBranch}">
        <code th:text="${buildInfo.gitCommit}">unknown</code>
        <span th:if="${buildInfo.gitBranch != 'unknown'}"
              th:text="' (' + ${buildInfo.gitBranch} + ')'"></span>
    </span>
    <span th:if="${buildInfo.gitCommitDate != ''}">·</span>
    <span th:if="${buildInfo.gitCommitDate != ''}"
          th:text="'commit ' + ${#strings.substring(buildInfo.gitCommitDate, 0, 10)}"></span>
    <span>·</span>
    <span th:text="'built ' + ${buildInfo.buildTime}"></span>
    <span style="margin-left:auto">
        <a href="/actuator/info" class="help-text">/actuator/info</a>
    </span>
</footer>
</body>
</html>
