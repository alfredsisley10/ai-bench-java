<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(${docTitle}, ~{::main})}">
<body>
<main>
    <p class="subtitle">
        Source of truth: <code th:text="'docs/' + ${docName} + '.md'"></code>
    </p>
    <article class="markdown-doc" th:utext="${docHtml}">
    </article>

    <style>
      .markdown-doc { line-height: 1.55; max-width: 1100px; }
      .markdown-doc h1 { margin-top: 0; }
      .markdown-doc h2, .markdown-doc h3 { margin-top: 1.5em; color: #0b2545; }
      .markdown-doc table { border-collapse: collapse; margin: 0.6em 0; }
      .markdown-doc th, .markdown-doc td { border: 1px solid #d1d5db; padding: 0.3em 0.6em; }
      .markdown-doc th { background: #f3f4f6; text-align: left; }
      .markdown-doc code { background: #f3f4f6; padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.92em; }
      .markdown-doc pre { background: #0b2545; color: #e5edf7; padding: 0.6em 0.9em; border-radius: 4px; overflow-x: auto; }
      .markdown-doc pre code { background: transparent; color: inherit; padding: 0; font-size: 0.85em; }
      .markdown-doc blockquote { border-left: 3px solid #d1d5db; padding-left: 0.9em; color: #4b5563; margin-left: 0; }
    </style>
</main>
</body>
</html>
